name: Release
on:
  push:
    branches: [main]

jobs:
  release:
    runs-on: macos-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'

      - name: Install dependencies
        run: npm install

      - name: Build and Package
        run: |
          # Build the Swift package
          swift build -c release
          
          # Find the binary
          BINARY_PATH=$(find .build -name DockLock -type f -perm +111 | grep "release/DockLock")
          
          # Create .app bundle
          mkdir -p DockLock.app/Contents/MacOS
          mkdir -p DockLock.app/Contents/Resources
          cp "$BINARY_PATH" DockLock.app/Contents/MacOS/DockLock
          cp Info.plist DockLock.app/Contents/Info.plist
          cp AppIcon.icns DockLock.app/Contents/Resources/AppIcon.icns
          
          # Sign the app (Ad-hoc signing in CI)
          codesign -s - -f --entitlements Entitlements.plist DockLock.app
          
          # Zip the app
          zip -r DockLock.zip DockLock.app

      - name: Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx semantic-release
